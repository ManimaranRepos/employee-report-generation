name: Build & Deploy to Azure Container Apps

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  IMAGE_NAME: employee-reports
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: |
          TOKEN=$(az acr login --name ${{ secrets.ACR_NAME }} --expose-token --output tsv --query accessToken)
          echo "$TOKEN" | docker login ${{ secrets.ACR_LOGIN_SERVER }} \
            --username 00000000-0000-0000-0000-000000000000 --password-stdin

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      - name: Deploy to Azure Container Apps
        env:
          APP:               ${{ secrets.AZURE_CONTAINER_APP_NAME }}
          RG:                ${{ secrets.AZURE_RESOURCE_GROUP }}
          IMAGE:             ${{ secrets.ACR_LOGIN_SERVER }}/employee-reports:${{ github.sha }}
          ACR_SRV:           ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_NAME:          ${{ secrets.ACR_NAME }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
          SMTP_SECURE:       ${{ secrets.SMTP_SECURE }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          MAIL_FROM:         ${{ secrets.MAIL_FROM }}
          MAIL_PREVIEW_ONLY: ${{ secrets.MAIL_PREVIEW_ONLY }}
          MAIL_TO_OVERRIDE:  ${{ secrets.MAIL_TO_OVERRIDE }}
        run: |
          az extension add --name containerapp --upgrade --only-show-errors

          # Enable admin and fetch credentials from the authenticated Azure session
          az acr update --name "$ACR_NAME" --admin-enabled true --only-show-errors
          ACR_USER=$(az acr credential show --name "$ACR_NAME" --query username -o tsv)
          ACR_PASS=$(az acr credential show --name "$ACR_NAME" --query "passwords[0].value" -o tsv)

          ENV_NAME=$(az containerapp env list -g "$RG" --query "[0].name" -o tsv 2>/dev/null)
          if [ -z "$ENV_NAME" ]; then
            echo "No Container Apps Environment found, creating one..."
            ENV_NAME="${APP}-env"
            az containerapp env create -n "$ENV_NAME" -g "$RG" --location eastus
          fi

          EXISTS=$(az containerapp show -n "$APP" -g "$RG" --query name -o tsv 2>/dev/null || true)

          if [ -n "$EXISTS" ]; then
            echo "Updating existing Container App..."
            az containerapp registry set -n "$APP" -g "$RG" \
              --server "$ACR_SRV" --username "$ACR_USER" --password "$ACR_PASS"
            az containerapp update -n "$APP" -g "$RG" --image "$IMAGE" \
              --set-env-vars \
                "SMTP_HOST=$SMTP_HOST" \
                "SMTP_PORT=$SMTP_PORT" \
                "SMTP_SECURE=$SMTP_SECURE" \
                "SMTP_USER=$SMTP_USER" \
                "SMTP_PASS=$SMTP_PASS" \
                "MAIL_FROM=$MAIL_FROM" \
                "MAIL_PREVIEW_ONLY=$MAIL_PREVIEW_ONLY" \
                "MAIL_TO_OVERRIDE=$MAIL_TO_OVERRIDE"
          else
            echo "Creating new Container App..."
            az containerapp create -n "$APP" -g "$RG" \
              --environment "$ENV_NAME" \
              --image "$IMAGE" \
              --registry-server "$ACR_SRV" \
              --registry-username "$ACR_USER" \
              --registry-password "$ACR_PASS" \
              --ingress external \
              --target-port 8080 \
              --cpu 0.5 --memory 1.0Gi \
              --env-vars \
                "SMTP_HOST=$SMTP_HOST" \
                "SMTP_PORT=$SMTP_PORT" \
                "SMTP_SECURE=$SMTP_SECURE" \
                "SMTP_USER=$SMTP_USER" \
                "SMTP_PASS=$SMTP_PASS" \
                "MAIL_FROM=$MAIL_FROM" \
                "MAIL_PREVIEW_ONLY=$MAIL_PREVIEW_ONLY" \
                "MAIL_TO_OVERRIDE=$MAIL_TO_OVERRIDE"
          fi
